extends:
  - apps/*/lefthook.yml
  - packages/*/lefthook.yml

pre-commit:
  jobs:
    - run: bun oxfmt --no-error-on-unmatched-pattern {staged_files}
      glob: "**/*.{ts,tsx,js,jsx,json,jsonc,yaml,yml,toml,html,css,md,mdx}"
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - run: bun lint
      glob: "**/*.*"
      root: "."
