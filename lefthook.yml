extends:
  - apps/*/lefthook.yml
  - packages/*/lefthook.yml

pre-commit:
  jobs:
    - run: bun tombi format {staged_files}
      glob: "**/*.toml"
      stage_fixed: true
    - run: bun tombi lint {staged_files}
      glob: "**/*.toml"

pre-push:
  parallel: true
  jobs:
    - run: bun lint
      glob: "**/*.*"
      root: "."
    - run: bun tombi lint
      glob: "**/*.toml"
      root: "."
